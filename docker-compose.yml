services:
  # ===================== Database (PostgreSQL) =====================
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: DevPulse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: raminazali
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ===================== Backend (ASP.NET Core 10) =====================
  api:
    build:
      context: ./DevPulse
      dockerfile: DevPulse.Api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DevPulse=Host=db;Port=5432;Database=DevPulse;Username=postgres;Password=raminazali
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ===================== Frontend (React 19 + Nginx) =====================
  web:
    build:
      context: ./admin-panel
      args:
        VITE_API_URL: /api
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
