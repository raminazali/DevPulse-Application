name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore DevPulse/DevPulse.slnx

      - name: Build
        run: dotnet build DevPulse/DevPulse.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test DevPulse/DevPulse.slnx --no-build --configuration Release --verbosity normal

  build-and-push-docker:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        if: ${{ secrets.DOCKER_HUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Docker image
        if: ${{ secrets.DOCKER_HUB_USERNAME != '' }}
        uses: docker/build-push-action@v5
        with:
          context: ./DevPulse
          file: DevPulse/DevPulse.Api/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/devpulse-backend:${{ github.sha }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/devpulse-backend:latest

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to server via SSH
        if: ${{ secrets.SERVER_IP != '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Deployment started..."
            cd /opt/myproject
            git pull origin main
            docker compose up -d --build
            docker image prune -f
            echo "Deployment completed!"
