name: CI/CD Pipeline for DevPulse Backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '10.0.x'
  DOCKER_IMAGE: ${{ secrets.DOCKER_HUB_USERNAME }}/devpulse-backend
  DOCKER_TAG: ${{ github.sha }}

jobs:
  # ========================================
  # Job 1: Build and Test
  # ========================================
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore DevPulse/DevPulse.slnx

      - name: Build
        run: dotnet build DevPulse/DevPulse.slnx --no-restore --configuration Release

      - name: Run tests
        run: dotnet test DevPulse/DevPulse.slnx --no-build --configuration Release --verbosity normal

  # ========================================
  # Job 2: Build Docker Image and Push to Docker Hub
  # ========================================
  build-and-push-docker:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./DevPulse
          file: DevPulse/DevPulse.Api/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
            ${{ env.DOCKER_IMAGE }}:latest

  # ========================================
  # Job 3: Deploy to Server
  # ========================================
  deploy:
    needs: build-and-push-docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Deployment started..."

            cd /opt/myproject

            # Pull the new image
            docker pull ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}

            # Update the image tag in the production compose file
            sed -i "s|image:.*devpulse-backend.*|image: ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}|g" docker-compose.prod.yml

            # Restart the stack with the production config
            docker compose -f docker-compose.prod.yml up -d

            # Clean up old images
            docker image prune -f

            echo "Deployment completed!"
